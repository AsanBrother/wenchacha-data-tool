<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#165DFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" />
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.3" />
  
  <g transform="translate(100, 85)">
    <circle cx="0" cy="15" r="22" fill="#FFE0B2" />
    <circle cx="0" cy="15" r="22" fill="none" stroke="#FF8A65" stroke-width="1.5"/>
    
    <ellipse cx="-8" cy="12" rx="3" ry="4" fill="#5D4037"/>
    <ellipse cx="8" cy="12" rx="3" ry="4" fill="#5D4037"/>
    
    <path d="M-5 22 Q0 26 5 22" fill="none" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
    
    <path d="M-18 0 L0 -12 L18 0 L12 8 L0 -4 L-12 8 Z" fill="#FFFFFF"/>
    <circle cx="0" cy="-18" r="4" fill="#FFFFFF"/>
    <line x1="0" y1="-14" x2="0" y2="-22" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="-22" r="2" fill="#FFD700"/>
  </g>
  
  <g transform="translate(130, 60)">
    <circle cx="0" cy="0" r="28" fill="url(#glassGradient)" stroke="#165DFF" stroke-width="3" filter="url(#shadow)"/>
    <line x1="20" y1="20" x2="38" y2="38" stroke="#165DFF" stroke-width="8" stroke-linecap="round"/>
    
    <g transform="translate(-12, -8)">
      <rect x="0" y="0" width="6" height="16" fill="#4CAF50" rx="1"/>
      <rect x="8" y="4" width="6" height="12" fill="#2196F3" rx="1"/>
      <rect x="16" y="2" width="6" height="14" fill="#FF9800" rx="1"/>
    </g>
  </g>
  
  <g opacity="0.7">
    <circle cx="45" cy="45" r="3" fill="white"/>
    <circle cx="155" cy="145" r="4" fill="white"/>
    <circle cx="50" cy="160" r="2" fill="white"/>
    <circle cx="160" cy="55" r="2.5" fill="white"/>
  </g>
  
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">文查查</text>
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="8" fill="white" fill-opacity="0.7" text-anchor="middle">Research Integrity</text>
</svg>
